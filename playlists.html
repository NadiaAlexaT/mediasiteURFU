<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Плейлисты</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:Inter,system-ui,Arial,sans-serif;
      background-image:url('images/fon.png');
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
      background-attachment:fixed;
      min-height:100vh;
      color:#4a0e4e;
      padding:18px;
    }
    .wrap{max-width:1100px;margin:0 auto}
    .card{
      background:rgba(255,255,255,.92);
      border:2px solid #c724b1;
      border-radius:12px;
      box-shadow:3px 3px 0 #8b00a8;
      overflow:hidden;
    }
    .head{
      padding:8px 12px;
      color:#fff;
      background:linear-gradient(90deg,#c724b1,#ff6ec7);
      font-weight:900;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }
    .head a{
      color:#fff;text-decoration:none;font-weight:900;
      border:1px solid rgba(255,255,255,.7);
      padding:6px 10px;border-radius:10px;
      background:rgba(255,255,255,.2)
    }
    .body{padding:14px}

    .player{
      background:rgba(255,255,255,.94);
      border:1px solid #ffd1ef;
      border-radius:14px;
      padding:12px;
      box-shadow:1px 1px 0 rgba(139,0,168,.18);
      margin-bottom:12px;
    }
    .np{
      font-weight:900;
      color:#8b00a8;
      margin-bottom:10px;
      font-size:13px;
      word-break:break-word;
    }
    .controls{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
    }
    .btn{
      cursor:pointer;
      border:1px solid #fff;
      background:rgba(139,0,168,.92);
      color:#fff;
      font-weight:900;
      padding:10px 12px;
      border-radius:10px;
      box-shadow:2px 2px 0 #c724b1;
      white-space:nowrap;
    }
    .btn.secondary{background:rgba(199,36,177,.88)}
    .hint{
      font-size:12px;
      opacity:.8;
      line-height:1.35;
      margin-left:auto;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(4, minmax(0, 1fr));
      gap:12px;
    }
    @media (max-width: 900px){ .grid{grid-template-columns:repeat(2, 1fr)} }
    @media (max-width: 440px){ .grid{grid-template-columns:1fr} }

    .pl{
      background:rgba(255,255,255,.92);
      border:1px solid #ffd1ef;
      border-radius:14px;
      padding:10px;
      box-shadow:1px 1px 0 rgba(139,0,168,.18);
      overflow:hidden;
    }

    .cover{
      width:100%;
      aspect-ratio:1/1;
      border-radius:12px;
      border:1px solid rgba(199,36,177,.35);
      background:
        radial-gradient(800px 300px at 30% 0%, rgba(255,110,199,.22), transparent 55%),
        radial-gradient(700px 300px at 70% 100%, rgba(199,36,177,.16), transparent 55%),
        linear-gradient(135deg, rgba(255,255,255,.9), rgba(255,255,255,.6));
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }
    .cover img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:none;
    }
    .cover.has-img img{ display:block; }
    .ph{
      text-align:center;
      padding:14px;
      font-weight:900;
      color:#8b00a8;
      opacity:.85;
    }
    .cover.has-img .ph{ display:none; }

    .title{
      margin-top:10px;
      font-weight:900;
      color:#8b00a8;
      font-size:14px;
    }
    .meta{
      margin-top:4px;
      font-size:12px;
      opacity:.8;
    }
    .actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:10px;
    }
    .small{
      font-size:12px;
      font-weight:900;
      border-radius:10px;
      padding:8px 10px;
      cursor:pointer;
      border:1px solid rgba(199,36,177,.35);
      background:rgba(255,110,199,.10);
      color:#4a0e4e;
    }
    .small.danger{
      background:rgba(150,0,0,.08);
      border-color:rgba(150,0,0,.25);
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <div class="head">
        <span>Плейлисты</span>
        <a href="index.html">← на главную</a>
      </div>

      <div class="body">

        <!-- ПЛЕЕР -->
        <div class="player">
          <div class="np" id="np">Выберите плейлист и нажмите ▶ Play</div>

          <div class="controls">
            <button class="btn" id="playBtn" type="button">▶ Play</button>
            <button class="btn secondary" id="pauseBtn" type="button">⏸ Пауза</button>
            <button class="btn secondary" id="nextBtn" type="button">⏭ Следующий</button>
            
            
          </div>

          <audio id="audioPlayer" preload="metadata"></audio>
        </div>

        <!-- ПЛЕЙЛИСТЫ -->
        <div class="grid" id="grid"></div>
      </div>
    </div>
  </div>

<script>
  // ====== ТВОИ ПЛЕЙЛИСТЫ ======
  const playlists = {
    'v-univer': { name:'🚶 В универ', tracks:[
      'music/v-univer/50Cent-PIMP.mp3',
      'music/v-univer/DavidGuetta-SexyBitch.mp3',
      'music/v-univer/LadyGaga-PockerFace.mp3',
      'music/v-univer/Tom J-Sexbomb.mp3',
      'music/v-univer/Нюша-Выбирать Чудо.mp3'
    ]},
    'dz': { name:'📖 Дз', tracks:[
      'music/dz/5sta family-Я буду.mp3',
      'music/dz/Dasha Suvorova-Опять не будет спать.mp3',
      'music/dz/Thicc Aesth-STEREO LOVE.mp3',
      'music/dz/Гости из будущего-Люби меня по-французски.mp3',
      'music/dz/Земфира-Искала.mp3'
    ]},
    'sessia': { name:'😩 Сессия', tracks:[
      'music/sessia/Eminem Dido-Stan.mp3',
      'music/sessia/Linkin_Park-In The End.mp3',
      'music/sessia/Nickelback -How You Remind Me.mp3',
      'music/sessia/tATu-Я сошла с ума.mp3',
      'music/sessia/Пропаганда-Мелом.mp3'
    ]},
    'sdal': { name:'🎉 Сдал!', tracks:[
      'music/sdal/Benny Benassi-Satisfaction.mp3',
      'music/sdal/Mika-Relax Take It Easy.mp3',
      'music/sdal/Stromae-Alors On Dance.mp3',
      'music/sdal/tATu-Нас не догонят.mp3',
      'music/sdal/Жанна Фриске - Ла Ла Ла.mp3'
    ]}
  };

  

  // ====== ПЛЕЕР ======
  let currentTracks = [];
  let currentIndex = 0;
  let currentPlName = "";

  const audio = document.getElementById('audioPlayer');
  const npLabel = document.getElementById('np');

  function playCurrent(){
    if(!currentTracks.length) return;
    audio.src = currentTracks[currentIndex];
    audio.play().catch(()=>{});
    const fileName = currentTracks[currentIndex].split('/').pop();
    npLabel.textContent = '▶ ' + (currentPlName || '') + ' — ' + fileName;
  }

  function loadPL(key){
    const pl = playlists[key];
    if(!pl) return;
    currentTracks = pl.tracks || [];
    currentIndex = 0;
    currentPlName = pl.name || "";
    playCurrent();
  }

  function nextTrack(){
    if(!currentTracks.length) return;
    currentIndex++;
    if(currentIndex >= currentTracks.length) currentIndex = 0;
    playCurrent();
  }

  if(audio){
    audio.addEventListener('ended', nextTrack);
  }

  document.getElementById("playBtn").addEventListener("click", () => {
    if(!currentTracks.length){
      npLabel.textContent = "Сначала выберите плейлист (кнопка «играть» на карточке).";
      return;
    }
    audio.play().catch(()=>{});
  });

  document.getElementById("pauseBtn").addEventListener("click", () => {
    audio.pause();
  });

  document.getElementById("nextBtn").addEventListener("click", () => {
    nextTrack();
  });

  // ====== РЕНДЕР ПЛЕЙЛИСТОВ ======
  const gridEl = document.getElementById("grid");

  function escapeHtml(str){
    return (str || "")
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;");
  }

  function render(){
    gridEl.innerHTML = "";
    for(const key of Object.keys(playlists)){
      const pl = playlists[key];
      const coverDataUrl = `images/covers/${key}.jpg`;
      const coverClass = coverDataUrl ? "cover has-img" : "cover";
      const trackCount = (pl.tracks || []).length;

      const el = document.createElement("div");
      el.className = "pl";
      el.innerHTML = `
        <div class="${coverClass}">
          <img alt="Обложка" src="${coverDataUrl ? escapeHtml(coverDataUrl) : ""}">
          <div class="ph">Обложка</div>
        </div>

        <div class="title">${escapeHtml(pl.name)}</div>
        <div class="meta">Треков: ${trackCount}</div>

        <div class="actions">
          <button class="small" data-action="play" data-key="${escapeHtml(key)}" type="button">▶ играть</button>
         
        </div>
      `;
      gridEl.appendChild(el);
    }
  }

  function fileToDataUrl(file){
    return new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload = () => resolve(String(r.result || ""));
      r.onerror = reject;
      r.readAsDataURL(file);
    });
  }

  gridEl.addEventListener("click", async (e) => {
    const btn = e.target.closest("button[data-action]");
    if(!btn) return;

    const action = btn.dataset.action;
    const key = btn.dataset.key;

    if(action === "play"){
      loadPL(key);
      return;
    }

    if(action === "clear"){
      covers[key] = "";
      saveCovers(covers);
      render();
      return;
    }

    if(action === "cover"){
      const input = document.createElement("input");
      input.type = "file";
      input.accept = "image/*";
      input.addEventListener("change", async () => {
        const file = input.files && input.files[0];
        if(!file) return;

        if(file.size > 2.2 * 1024 * 1024){
          alert("Файл слишком большой. Выбери картинку до ~2 МБ.");
          return;
        }

        const dataUrl = await fileToDataUrl(file);
        covers[key] = dataUrl;
        saveCovers(covers);
        render();
      });
      input.click();
      return;
    }
  });

 

  render();
</script>
</body>
</html>
