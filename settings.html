<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Настройки</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:Inter,system-ui,Arial,sans-serif;
      background-image:url('images/fon.png');
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
      background-attachment:fixed;
      min-height:100vh;
      color:#4a0e4e;
      padding:18px;
    }
    .wrap{max-width:900px;margin:0 auto}
    .card{
      background:rgba(255,255,255,.92);
      border:2px solid #c724b1;
      border-radius:12px;
      box-shadow:3px 3px 0 #8b00a8;
      overflow:hidden;
    }
    .head{
      padding:8px 12px;
      color:#fff;
      background:linear-gradient(90deg,#c724b1,#ff6ec7);
      font-weight:900;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }
    .head a{
      color:#fff;text-decoration:none;font-weight:900;
      border:1px solid rgba(255,255,255,.7);
      padding:6px 10px;border-radius:10px;
      background:rgba(255,255,255,.2)
    }
    .body{padding:14px}
    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      align-items:start;
    }
    @media (max-width: 820px){
      .grid{grid-template-columns:1fr}
    }
    .block{
      background:rgba(255,255,255,.9);
      border:1px solid #ffd1ef;
      border-radius:12px;
      padding:12px;
    }
    h2{
      font-size:16px;
      margin-bottom:10px;
      color:#8b00a8;
      font-weight:900;
    }
    label{
      display:block;
      font-size:12px;
      opacity:.85;
      margin:10px 0 6px;
      font-weight:700;
    }
    input, select{
      width:100%;
      font:inherit;
      outline:none;
      border:2px solid #c724b1;
      border-radius:10px;
      padding:10px;
      background:#fff;
      color:#4a0e4e;
    }
    .row{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:12px;
    }
    .btn{
      cursor:pointer;
      border:1px solid #fff;
      background:rgba(139,0,168,.92);
      color:#fff;
      font-weight:900;
      padding:10px 12px;
      border-radius:10px;
      box-shadow:2px 2px 0 #c724b1;
      white-space:nowrap;
    }
    .btn.secondary{background:rgba(199,36,177,.88)}
    .btn.danger{background:rgba(150,0,0,.9)}
    .hint{
      font-size:12px;
      opacity:.8;
      margin-top:10px;
      line-height:1.35;
    }
    .ok{
      margin-top:10px;
      font-size:12px;
      font-weight:800;
      color:#2d7a2d;
      display:none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="head">
        <span>Настройки</span>
        <a href="index.html">← на главную</a>
      </div>

      <div class="body">
        <div class="grid">
          <div class="block">
            <h2>Профиль</h2>

            <label for="name">Ваше имя (как будет в чатах)</label>
            <input id="name" type="text" placeholder="Например: Алина" />

            <div class="hint">
              Имя сохраняется в браузере и будет использоваться в «Болталке».
            </div>

            <div class="row">
              <button class="btn" id="saveBtn" type="button">сохранить</button>
              <a class="btn secondary" href="chat.html" style="text-decoration:none;display:inline-block">открыть болталку</a>
            </div>

            <div class="ok" id="savedOk">Сохранено.</div>
          </div>

          <div class="block">
            <h2>Чаты</h2>

            <label for="autoFlow">Автопоток сообщений</label>
            <select id="autoFlow">
              <option value="on">включён</option>
              <option value="off">выключен</option>
            </select>

            <label for="density">Плотность сообщений</label>
            <select id="density">
              <option value="low">низкая</option>
              <option value="normal" selected>обычная</option>
              <option value="high">высокая</option>
            </select>

            <div class="hint">
              Эти параметры применяются в болталке после перезагрузки страницы чата.
            </div>

            <div class="row">
              <button class="btn secondary" id="resetChatsBtn" type="button">сбросить историю чатов</button>
              <button class="btn danger" id="wipeAllBtn" type="button">сбросить всё</button>
            </div>

            <div class="hint">
              «Сбросить всё» удалит имя и историю чатов в этом браузере.
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

<script>
  // Эти ключи совпадают с теми, что используются в chat.html (версия v2)
  const STORAGE_CHAT_STATE = "mediacomm_chat_state_v2";
  const STORAGE_ME_NAME = "mediacomm_me_name_v2";

  // Доп. настройки для чата (мы их просто сохраняем, а чат может читать)
  const STORAGE_CHAT_AUTOFLOW = "mediacomm_chat_autoflow_v2"; // "on"/"off"
  const STORAGE_CHAT_DENSITY  = "mediacomm_chat_density_v2";  // "low"/"normal"/"high"

  const nameEl = document.getElementById("name");
  const autoFlowEl = document.getElementById("autoFlow");
  const densityEl = document.getElementById("density");
  const savedOkEl = document.getElementById("savedOk");

  function load(){
    nameEl.value = localStorage.getItem(STORAGE_ME_NAME) || (localStorage.getItem("userName") || "Вы");
    autoFlowEl.value = localStorage.getItem(STORAGE_CHAT_AUTOFLOW) || "on";
    densityEl.value = localStorage.getItem(STORAGE_CHAT_DENSITY) || "normal";
  }

  function showSaved(){
    savedOkEl.style.display = "block";
    clearTimeout(showSaved._t);
    showSaved._t = setTimeout(() => savedOkEl.style.display = "none", 1200);
  }

  document.getElementById("saveBtn").addEventListener("click", () => {
    const v = (nameEl.value || "").trim();
    localStorage.setItem(STORAGE_ME_NAME, v || "Вы");

    // если у тебя где-то ещё используется userName — поддержим совместимость
    localStorage.setItem("userName", v || "Вы");

    localStorage.setItem(STORAGE_CHAT_AUTOFLOW, autoFlowEl.value);
    localStorage.setItem(STORAGE_CHAT_DENSITY, densityEl.value);

    showSaved();
  });

  document.getElementById("resetChatsBtn").addEventListener("click", () => {
    if(!confirm("Сбросить историю чатов?")) return;
    localStorage.removeItem(STORAGE_CHAT_STATE);
    showSaved();
  });

  document.getElementById("wipeAllBtn").addEventListener("click", () => {
    if(!confirm("Сбросить все настройки и историю?")) return;
    localStorage.removeItem(STORAGE_CHAT_STATE);
    localStorage.removeItem(STORAGE_ME_NAME);
    localStorage.removeItem(STORAGE_CHAT_AUTOFLOW);
    localStorage.removeItem(STORAGE_CHAT_DENSITY);
    localStorage.removeItem("userName");
    showSaved();
  });

  // Автосохранение при смене селектов (удобно)
  autoFlowEl.addEventListener("change", () => {
    localStorage.setItem(STORAGE_CHAT_AUTOFLOW, autoFlowEl.value);
    showSaved();
  });
  densityEl.addEventListener("change", () => {
    localStorage.setItem(STORAGE_CHAT_DENSITY, densityEl.value);
    showSaved();
  });

  load();
</script>
</body>
</html>
